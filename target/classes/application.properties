# \u00ec\u0088\u0098\u00eb\u008f\u0099 Bean\u00ec\u009d\u00b4 \u00ec\u009e\u0090\u00eb\u008f\u0099 Bean\u00ec\u009d\u0084 \u00ec\u0098\u00a4\u00eb\u00b2\u0084\u00eb\u009d\u00bc\u00ec\u009d\u00b4\u00eb\u0094\u00a9\u00ed\u0095\u0098\u00ea\u00b2\u008c \u00ec\u0084\u00a4\u00ec\u00a0\u0095
spring.main.allow-bean-definition-overriding=true

# open-in-view false: \u00ed\u008a\u00b8\u00eb\u009e\u009c\u00ec\u009e\u00ad\u00ec\u0085\u0098\u00ec\u009d\u00b4 \u00ec\u00a2\u0085\u00eb\u00a3\u008c\u00eb\u0090\u00a0 \u00eb\u0095\u008c \u00ec\u0098\u0081\u00ec\u0086\u008d\u00ec\u0084\u00b1 \u00ec\u00bb\u00a8\u00ed\u0085\u008d\u00ec\u008a\u00a4\u00ed\u008a\u00b8 \u00ec\u00a2\u0085\u00eb\u00a3\u008c
spring.jpa.open-in-view=false

# ===== SQL \u00ec\u00b4\u0088\u00ea\u00b8\u00b0\u00ed\u0099\u0094 \u00eb\u00b9\u0084\u00ed\u0099\u009c\u00ec\u0084\u00b1\u00ed\u0099\u0094 =====
spring.sql.init.mode=never

